# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven
name: Java CI
on:
  repository_dispatch:
    types: [build]
  workflow_dispatch:
    inputs:
      version:
        description: 'Enter APP_VERSION and run java Build CI'
        required: true
      confirm:
        description: 'Run?'
        required: true
        default: 'YES!'
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  APP_VERSION: ${{ github.event.inputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'corretto'
        cache: 'maven'

    - name: Build with Maven
      run: xvfb-run mvn -B package

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: filemanager-jar
        path: target/filemanager.jar
        if-no-files-found: error

  upload:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: filemanager-jar

    - name: GH Release
      uses: softprops/action-gh-release@v2.6.1
      with:
        body_path: file manager version ${{ github.event.inputs.version }} released
        files: filemanager.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}